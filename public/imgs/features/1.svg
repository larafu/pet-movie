<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Golden's Adventure - Movie Thumbnail -->

  <!-- Background gradient - warm adventure theme -->
  <defs>
    <linearGradient id="adventure-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:oklch(0.92 0.15 60);stop-opacity:1" />
      <stop offset="100%" style="stop-color:oklch(0.85 0.18 50);stop-opacity:1" />
    </linearGradient>
    <linearGradient id="video-overlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:oklch(0.2 0.05 140);stop-opacity:0" />
      <stop offset="100%" style="stop-color:oklch(0.2 0.05 140);stop-opacity:0.7" />
    </linearGradient>
  </defs>

  <!-- Main background -->
  <rect width="800" height="600" fill="url(#adventure-bg)" rx="16"/>

  <!-- Mountain silhouettes for adventure theme -->
  <path d="M 0 400 L 200 250 L 400 350 L 600 200 L 800 300 L 800 600 L 0 600 Z" fill="oklch(0.75 0.12 55)" opacity="0.6"/>
  <path d="M 0 450 L 150 320 L 350 400 L 550 280 L 800 380 L 800 600 L 0 600 Z" fill="oklch(0.65 0.15 50)" opacity="0.7"/>

  <!-- Golden retriever silhouette -->
  <g transform="translate(320, 280)">
    <!-- Dog body -->
    <ellipse cx="0" cy="20" rx="80" ry="50" fill="oklch(0.4 0.1 50)"/>
    <!-- Head -->
    <circle cx="-50" cy="0" r="35" fill="oklch(0.4 0.1 50)"/>
    <!-- Ears -->
    <ellipse cx="-70" cy="-5" rx="18" ry="28" fill="oklch(0.35 0.12 48)"/>
    <ellipse cx="-35" cy="-8" rx="16" ry="25" fill="oklch(0.35 0.12 48)"/>
    <!-- Legs -->
    <rect x="-60" y="50" width="18" height="40" rx="9" fill="oklch(0.38 0.11 49)"/>
    <rect x="-25" y="50" width="18" height="40" rx="9" fill="oklch(0.38 0.11 49)"/>
    <rect x="10" y="50" width="18" height="40" rx="9" fill="oklch(0.38 0.11 49)"/>
    <rect x="45" y="50" width="18" height="40" rx="9" fill="oklch(0.38 0.11 49)"/>
    <!-- Tail -->
    <path d="M 80 10 Q 110 -10 120 10" stroke="oklch(0.4 0.1 50)" stroke-width="16" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Video overlay gradient -->
  <rect width="800" height="600" fill="url(#video-overlay)" rx="16"/>

  <!-- Video player UI elements -->
  <g opacity="0.95">
    <!-- Play button -->
    <circle cx="400" cy="300" r="50" fill="oklch(0.95 0.02 140)" opacity="0.9"/>
    <path d="M 385 280 L 385 320 L 420 300 Z" fill="oklch(0.85 0.15 140)"/>

    <!-- Bottom info bar -->
    <rect y="520" width="800" height="80" fill="oklch(0.15 0.02 140)" opacity="0.85" rx="0 0 16 16"/>

    <!-- Title -->
    <text x="40" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="oklch(0.95 0.02 140)">Golden's Adventure</text>

    <!-- Metadata -->
    <g transform="translate(40, 580)">
      <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="oklch(0.75 0.08 60)">Adventure Theme</text>
      <circle cx="150" cy="-6" r="3" fill="oklch(0.75 0.08 60)"/>
      <text x="165" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="oklch(0.75 0.08 60)">2:30</text>
      <circle cx="220" cy="-6" r="3" fill="oklch(0.75 0.08 60)"/>
      <text x="235" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="oklch(0.75 0.08 60)">4K</text>
    </g>

    <!-- View count badge -->
    <g transform="translate(680, 555)">
      <rect x="0" y="0" width="90" height="32" rx="16" fill="oklch(0.85 0.15 140)" opacity="0.9"/>
      <text x="45" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="oklch(0.15 0.02 140)" text-anchor="middle">2.3K views</text>
    </g>
  </g>

  <!-- Paw print watermark - optimized for light/dark modes -->
  <g transform="translate(720, 50)" opacity="0.6">
    <!-- Main pad with stroke for visibility -->
    <ellipse cx="0" cy="8" rx="12" ry="14" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
    <!-- Toe pads with increased spacing and strokes -->
    <ellipse cx="-14" cy="-6" rx="6" ry="8" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
    <ellipse cx="-4" cy="-10" rx="6" ry="8" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
    <ellipse cx="6" cy="-10" rx="6" ry="8" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
    <ellipse cx="16" cy="-6" rx="6" ry="8" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
  </g>
</svg>