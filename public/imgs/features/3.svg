<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Cat Detective - Mystery Theme Movie Thumbnail -->

  <!-- Background gradient - dark mystery theme -->
  <defs>
    <linearGradient id="mystery-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:oklch(0.35 0.08 280);stop-opacity:1" />
      <stop offset="100%" style="stop-color:oklch(0.25 0.10 270);stop-opacity:1" />
    </linearGradient>
    <linearGradient id="video-overlay-3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:oklch(0.1 0.02 140);stop-opacity:0" />
      <stop offset="100%" style="stop-color:oklch(0.1 0.02 140);stop-opacity:0.8" />
    </linearGradient>
    <radialGradient id="spotlight" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:oklch(0.65 0.15 280);stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:oklch(0.25 0.10 270);stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Main background -->
  <rect width="800" height="600" fill="url(#mystery-bg)" rx="16"/>

  <!-- Spotlight effect -->
  <ellipse cx="400" cy="200" rx="300" ry="250" fill="url(#spotlight)"/>

  <!-- Window silhouette for mystery atmosphere -->
  <g opacity="0.15">
    <rect x="600" y="80" width="140" height="200" rx="8" fill="oklch(0.45 0.08 280)"/>
    <line x1="670" y1="80" x2="670" y2="280" stroke="oklch(0.25 0.05 270)" stroke-width="4"/>
    <line x1="600" y1="180" x2="740" y2="180" stroke="oklch(0.25 0.05 270)" stroke-width="4"/>
  </g>

  <!-- Cat silhouette with detective hat -->
  <g transform="translate(380, 280)">
    <!-- Detective hat -->
    <ellipse cx="0" cy="-45" rx="40" ry="8" fill="oklch(0.2 0.03 270)"/>
    <path d="M -25 -45 L -20 -75 L 20 -75 L 25 -45 Z" fill="oklch(0.22 0.04 275)"/>
    <rect x="-30" y="-48" width="60" height="5" fill="oklch(0.2 0.03 270)"/>

    <!-- Cat head -->
    <circle cx="0" cy="0" r="40" fill="oklch(0.18 0.03 275)"/>

    <!-- Pointy ears -->
    <path d="M -35 -20 L -45 -50 L -20 -25 Z" fill="oklch(0.18 0.03 275)"/>
    <path d="M 35 -20 L 45 -50 L 20 -25 Z" fill="oklch(0.18 0.03 275)"/>

    <!-- Eyes (glowing in dark) -->
    <ellipse cx="-15" cy="-5" rx="8" ry="12" fill="oklch(0.75 0.18 280)" opacity="0.9"/>
    <ellipse cx="15" cy="-5" rx="8" ry="12" fill="oklch(0.75 0.18 280)" opacity="0.9"/>
    <ellipse cx="-15" cy="-5" rx="4" ry="8" fill="oklch(0.95 0.05 280)"/>
    <ellipse cx="15" cy="-5" rx="4" ry="8" fill="oklch(0.95 0.05 280)"/>

    <!-- Body -->
    <ellipse cx="0" cy="50" rx="45" ry="40" fill="oklch(0.18 0.03 275)"/>

    <!-- Tail curled up -->
    <path d="M 45 60 Q 80 50 85 20 Q 87 0 75 -5" stroke="oklch(0.18 0.03 275)" stroke-width="12" fill="none" stroke-linecap="round"/>

    <!-- Legs -->
    <rect x="-30" y="80" width="12" height="30" rx="6" fill="oklch(0.16 0.03 275)"/>
    <rect x="-10" y="80" width="12" height="30" rx="6" fill="oklch(0.16 0.03 275)"/>
    <rect x="10" y="80" width="12" height="30" rx="6" fill="oklch(0.16 0.03 275)"/>
    <rect x="30" y="80" width="12" height="30" rx="6" fill="oklch(0.16 0.03 275)"/>
  </g>

  <!-- Magnifying glass prop -->
  <g transform="translate(280, 380)">
    <circle cx="0" cy="0" r="35" stroke="oklch(0.3 0.05 280)" stroke-width="6" fill="none" opacity="0.6"/>
    <line x1="25" y1="25" x2="50" y2="50" stroke="oklch(0.3 0.05 280)" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Question marks for mystery theme -->
  <text x="120" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="oklch(0.4 0.12 280)" opacity="0.3">?</text>
  <text x="650" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="oklch(0.4 0.12 280)" opacity="0.25">?</text>

  <!-- Video overlay gradient -->
  <rect width="800" height="600" fill="url(#video-overlay-3)" rx="16"/>

  <!-- Video player UI elements -->
  <g opacity="0.95">
    <!-- Play button -->
    <circle cx="400" cy="300" r="50" fill="oklch(0.95 0.02 140)" opacity="0.9"/>
    <path d="M 385 280 L 385 320 L 420 300 Z" fill="oklch(0.65 0.18 280)"/>

    <!-- Bottom info bar -->
    <rect y="520" width="800" height="80" fill="oklch(0.12 0.02 140)" opacity="0.9" rx="0 0 16 16"/>

    <!-- Title -->
    <text x="40" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="oklch(0.95 0.02 140)">Cat Detective</text>

    <!-- Metadata -->
    <g transform="translate(40, 580)">
      <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="oklch(0.65 0.15 280)">Mystery Theme</text>
      <circle cx="140" cy="-6" r="3" fill="oklch(0.65 0.15 280)"/>
      <text x="155" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="oklch(0.65 0.15 280)">3:00</text>
      <circle cx="210" cy="-6" r="3" fill="oklch(0.65 0.15 280)"/>
      <text x="225" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="oklch(0.65 0.15 280)">4K</text>
    </g>

    <!-- View count badge -->
    <g transform="translate(680, 555)">
      <rect x="0" y="0" width="90" height="32" rx="16" fill="oklch(0.65 0.18 280)" opacity="0.9"/>
      <text x="45" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="oklch(0.95 0.02 140)" text-anchor="middle">3.1K views</text>
    </g>
  </g>

  <!-- Paw print watermark - optimized for light/dark modes -->
  <g transform="translate(720, 50)" opacity="0.7">
    <!-- Main pad with stroke for visibility on dark background -->
    <ellipse cx="0" cy="8" rx="12" ry="14" fill="oklch(0.95 0.02 140)" stroke="oklch(0.4 0.08 280)" stroke-width="2"/>
    <!-- Toe pads with increased spacing and strokes -->
    <ellipse cx="-14" cy="-6" rx="6" ry="8" fill="oklch(0.95 0.02 140)" stroke="oklch(0.4 0.08 280)" stroke-width="2"/>
    <ellipse cx="-4" cy="-10" rx="6" ry="8" fill="oklch(0.95 0.02 140)" stroke="oklch(0.4 0.08 280)" stroke-width="2"/>
    <ellipse cx="6" cy="-10" rx="6" ry="8" fill="oklch(0.95 0.02 140)" stroke="oklch(0.4 0.08 280)" stroke-width="2"/>
    <ellipse cx="16" cy="-6" rx="6" ry="8" fill="oklch(0.95 0.02 140)" stroke="oklch(0.4 0.08 280)" stroke-width="2"/>
  </g>
</svg>