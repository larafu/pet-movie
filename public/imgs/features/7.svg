<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- AI Processing - Step 3 UI Mockup -->

  <defs>
    <linearGradient id="progress-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:oklch(0.85 0.15 140);stop-opacity:1" />
      <stop offset="100%" style="stop-color:oklch(0.78 0.18 150);stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="oklch(0.98 0.02 140)" rx="16"/>

  <!-- Browser window mockup -->
  <rect x="50" y="50" width="700" height="500" rx="12" fill="oklch(0.95 0.04 140)"/>

  <!-- Window header -->
  <rect x="50" y="50" width="700" height="50" rx="12 12 0 0" fill="oklch(0.92 0.05 140)"/>
  <circle cx="80" cy="75" r="8" fill="oklch(0.75 0.15 10)"/>
  <circle cx="110" cy="75" r="8" fill="oklch(0.80 0.15 60)"/>
  <circle cx="140" cy="75" r="8" fill="oklch(0.75 0.15 140)"/>

  <!-- URL bar -->
  <rect x="180" y="62" width="500" height="26" rx="13" fill="oklch(0.98 0.02 140)"/>
  <text x="200" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="oklch(0.50 0.05 140)">petmovie.ai/processing</text>

  <!-- Title -->
  <text x="400" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="oklch(0.25 0.05 140)" text-anchor="middle">AI Creating Your Movie</text>

  <!-- Main processing animation container -->
  <g transform="translate(400, 260)">
    <!-- Rotating circles (AI processing visual) -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="oklch(0.85 0.15 140)" stroke-width="3" opacity="0.2"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="oklch(0.82 0.16 145)" stroke-width="3" opacity="0.3"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="oklch(0.78 0.18 150)" stroke-width="3" opacity="0.4"/>

    <!-- Central AI icon -->
    <circle cx="0" cy="0" r="35" fill="oklch(0.85 0.15 140)" opacity="0.2"/>

    <!-- Sparkle/magic effects -->
    <g opacity="0.7">
      <path d="M -60 -60 L -55 -65 L -60 -70 L -65 -65 Z" fill="oklch(0.85 0.15 140)"/>
      <path d="M 60 -55 L 65 -60 L 60 -65 L 55 -60 Z" fill="oklch(0.82 0.16 145)"/>
      <path d="M -65 50 L -60 45 L -65 40 L -70 45 Z" fill="oklch(0.78 0.18 150)"/>
      <path d="M 55 60 L 60 55 L 55 50 L 50 55 Z" fill="oklch(0.85 0.15 140)"/>
    </g>

    <!-- AI brain/processing icon -->
    <text x="0" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="48" text-anchor="middle" opacity="0.8">✨</text>
  </g>

  <!-- Progress bar -->
  <g transform="translate(150, 380)">
    <rect x="0" y="0" width="500" height="12" rx="6" fill="oklch(0.90 0.05 140)"/>
    <rect x="0" y="0" width="350" height="12" rx="6" fill="url(#progress-gradient)"/>

    <!-- Percentage -->
    <text x="250" y="-10" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="oklch(0.25 0.05 140)" text-anchor="middle">68%</text>
  </g>

  <!-- Processing steps checklist -->
  <g transform="translate(150, 420)">
    <!-- Step 1: Completed -->
    <g>
      <circle cx="10" cy="10" r="8" fill="oklch(0.85 0.15 140)"/>
      <path d="M 7 10 L 9 12 L 13 8" stroke="oklch(0.15 0.02 140)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="30" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="oklch(0.35 0.05 140)">Analyzing content</text>
    </g>

    <!-- Step 2: Completed -->
    <g transform="translate(0, 35)">
      <circle cx="10" cy="10" r="8" fill="oklch(0.85 0.15 140)"/>
      <path d="M 7 10 L 9 12 L 13 8" stroke="oklch(0.15 0.02 140)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="30" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="oklch(0.35 0.05 140)">Generating storyboard</text>
    </g>

    <!-- Step 3: In Progress -->
    <g transform="translate(0, 70)">
      <circle cx="10" cy="10" r="8" fill="oklch(0.85 0.15 140)"/>
      <circle cx="10" cy="10" r="4" fill="oklch(0.15 0.02 140)">
        <animate attributeName="r" values="2;5;2" dur="1.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <text x="30" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="oklch(0.25 0.05 140)">Editing and color grading</text>
      <rect x="250" y="0" width="100" height="20" rx="10" fill="oklch(0.85 0.15 140)" opacity="0.2"/>
      <text x="300" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="oklch(0.85 0.15 140)" text-anchor="middle">In Progress</text>
    </g>

    <!-- Step 4: Pending -->
    <g transform="translate(0, 105)">
      <circle cx="10" cy="10" r="8" fill="none" stroke="oklch(0.75 0.08 140)" stroke-width="2"/>
      <text x="30" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="oklch(0.55 0.08 140)">Adding music and effects</text>
    </g>

    <!-- Step 5: Pending -->
    <g transform="translate(0, 140)">
      <circle cx="10" cy="10" r="8" fill="none" stroke="oklch(0.75 0.08 140)" stroke-width="2"/>
      <text x="30" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="oklch(0.55 0.08 140)">Final rendering</text>
    </g>
  </g>

  <!-- Time remaining -->
  <g transform="translate(150, 590)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="oklch(0.50 0.08 140)">⏱️ Estimated time remaining: <tspan font-weight="600" fill="oklch(0.25 0.05 140)">3 minutes</tspan></text>
  </g>

  <!-- Paw print watermark - optimized for light/dark modes -->
  <g transform="translate(730, 570)" opacity="0.6">
    <!-- Main pad with stroke for visibility -->
    <ellipse cx="0" cy="4" rx="10" ry="12" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
    <!-- Toe pads with increased spacing and strokes -->
    <ellipse cx="-11" cy="-5" rx="5" ry="7" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
    <ellipse cx="-3" cy="-8" rx="5" ry="7" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
    <ellipse cx="5" cy="-8" rx="5" ry="7" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
    <ellipse cx="13" cy="-5" rx="5" ry="7" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
  </g>
</svg>