<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Download & Share - Step 4 UI Mockup -->

  <defs>
    <linearGradient id="success-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:oklch(0.95 0.08 150);stop-opacity:1" />
      <stop offset="100%" style="stop-color:oklch(0.92 0.10 140);stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#success-bg)" rx="16"/>

  <!-- Browser window mockup -->
  <rect x="50" y="50" width="700" height="500" rx="12" fill="oklch(0.95 0.04 140)"/>

  <!-- Window header -->
  <rect x="50" y="50" width="700" height="50" rx="12 12 0 0" fill="oklch(0.92 0.05 140)"/>
  <circle cx="80" cy="75" r="8" fill="oklch(0.75 0.15 10)"/>
  <circle cx="110" cy="75" r="8" fill="oklch(0.80 0.15 60)"/>
  <circle cx="140" cy="75" r="8" fill="oklch(0.75 0.15 140)"/>

  <!-- URL bar -->
  <rect x="180" y="62" width="500" height="26" rx="13" fill="oklch(0.98 0.02 140)"/>
  <text x="200" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="oklch(0.50 0.05 140)">petmovie.ai/complete</text>

  <!-- Success checkmark -->
  <g transform="translate(400, 150)">
    <circle cx="0" cy="0" r="45" fill="oklch(0.85 0.15 140)" opacity="0.2"/>
    <circle cx="0" cy="0" r="35" fill="oklch(0.85 0.15 140)"/>
    <path d="M -15 0 L -5 10 L 18 -13" stroke="oklch(0.15 0.02 140)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="400" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="oklch(0.25 0.05 140)" text-anchor="middle">Your Movie is Ready!</text>
  <text x="400" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="oklch(0.45 0.08 140)" text-anchor="middle">Golden's Adventure • 2:30 • 4K Quality</text>

  <!-- Video preview thumbnail -->
  <g transform="translate(200, 290)">
    <rect x="0" y="0" width="400" height="225" rx="12" fill="oklch(0.88 0.12 50)"/>

    <!-- Gradient overlay -->
    <defs>
      <linearGradient id="thumb-overlay" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:oklch(0.2 0.05 140);stop-opacity:0" />
        <stop offset="100%" style="stop-color:oklch(0.2 0.05 140);stop-opacity:0.5" />
      </linearGradient>
    </defs>
    <rect x="0" y="0" width="400" height="225" rx="12" fill="url(#thumb-overlay)"/>

    <!-- Play button overlay -->
    <circle cx="200" cy="112" r="35" fill="oklch(0.15 0.02 140)" opacity="0.7"/>
    <path d="M 190 97 L 190 127 L 215 112 Z" fill="oklch(0.95 0.02 140)"/>

    <!-- 4K badge -->
    <g transform="translate(345, 15)">
      <rect x="0" y="0" width="40" height="24" rx="12" fill="oklch(0.15 0.02 140)" opacity="0.8"/>
      <text x="20" y="17" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="oklch(0.95 0.02 140)" text-anchor="middle">4K</text>
    </g>

    <!-- Duration badge -->
    <g transform="translate(15, 186)">
      <rect x="0" y="0" width="70" height="24" rx="12" fill="oklch(0.15 0.02 140)" opacity="0.8"/>
      <text x="35" y="17" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="oklch(0.95 0.02 140)" text-anchor="middle">2:30</text>
    </g>
  </g>

  <!-- Action buttons -->
  <g transform="translate(150, 535)">
    <!-- Download button -->
    <rect x="0" y="0" width="200" height="50" rx="25" fill="oklch(0.85 0.15 140)"/>
    <text x="100" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="oklch(0.15 0.02 140)" text-anchor="middle">⬇️ Download</text>

    <!-- Share button -->
    <rect x="220" y="0" width="150" height="50" rx="25" fill="oklch(0.98 0.02 140)" stroke="oklch(0.85 0.15 140)" stroke-width="2"/>
    <text x="295" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="oklch(0.25 0.05 140)" text-anchor="middle">📤 Share</text>

    <!-- Edit button -->
    <rect x="390" y="0" width="150" height="50" rx="25" fill="oklch(0.98 0.02 140)" stroke="oklch(0.75 0.10 140)" stroke-width="2"/>
    <text x="465" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="oklch(0.35 0.05 140)" text-anchor="middle">✏️ Edit</text>
  </g>

  <!-- Share to social media icons -->
  <g transform="translate(150, 600)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="oklch(0.50 0.08 140)">Share to:</text>

    <!-- Social icons -->
    <g transform="translate(70, -12)">
      <!-- Instagram -->
      <circle cx="15" cy="12" r="14" fill="oklch(0.88 0.15 330)" opacity="0.8"/>
      <rect x="8" y="5" width="14" height="14" rx="3" fill="none" stroke="oklch(0.15 0.02 140)" stroke-width="1.5"/>
      <circle cx="15" cy="12" r="3.5" fill="none" stroke="oklch(0.15 0.02 140)" stroke-width="1.5"/>

      <!-- YouTube -->
      <circle cx="55" cy="12" r="14" fill="oklch(0.85 0.20 20)" opacity="0.8"/>
      <path d="M 50 8 L 50 16 L 58 12 Z" fill="oklch(0.15 0.02 140)"/>

      <!-- TikTok -->
      <circle cx="95" cy="12" r="14" fill="oklch(0.88 0.10 190)" opacity="0.8"/>
      <text x="95" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="900" fill="oklch(0.15 0.02 140)" text-anchor="middle">T</text>

      <!-- Facebook -->
      <circle cx="135" cy="12" r="14" fill="oklch(0.85 0.15 220)" opacity="0.8"/>
      <text x="135" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="900" fill="oklch(0.15 0.02 140)" text-anchor="middle">f</text>

      <!-- Twitter/X -->
      <circle cx="175" cy="12" r="14" fill="oklch(0.82 0.10 240)" opacity="0.8"/>
      <text x="175" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="900" fill="oklch(0.15 0.02 140)" text-anchor="middle">𝕏</text>
    </g>
  </g>

  <!-- Download format options (subtle text) -->
  <g transform="translate(580, 600)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="oklch(0.55 0.08 140)">MP4 • MOV • 4K • 1080p</text>
  </g>

  <!-- Paw print watermark - optimized for light/dark modes -->
  <g transform="translate(730, 570)" opacity="0.6">
    <!-- Main pad with stroke for visibility -->
    <ellipse cx="0" cy="4" rx="10" ry="12" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
    <!-- Toe pads with increased spacing and strokes -->
    <ellipse cx="-11" cy="-5" rx="5" ry="7" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
    <ellipse cx="-3" cy="-8" rx="5" ry="7" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
    <ellipse cx="5" cy="-8" rx="5" ry="7" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
    <ellipse cx="13" cy="-5" rx="5" ry="7" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
  </g>
</svg>