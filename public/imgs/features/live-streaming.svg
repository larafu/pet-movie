<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Live Streaming Feature - Coming Soon -->

  <defs>
    <linearGradient id="streaming-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:oklch(0.25 0.08 280);stop-opacity:1" />
      <stop offset="100%" style="stop-color:oklch(0.18 0.06 270);stop-opacity:1" />
    </linearGradient>
    <linearGradient id="light-effect" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:oklch(0.85 0.20 10);stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:oklch(0.25 0.08 280);stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#streaming-bg)" rx="16"/>

  <!-- Light effect from top -->
  <ellipse cx="400" cy="100" rx="350" ry="200" fill="url(#light-effect)"/>

  <!-- Streaming interface mockup -->
  <g transform="translate(100, 100)">
    <!-- Main video window -->
    <rect x="0" y="0" width="500" height="350" rx="16" fill="oklch(0.15 0.04 275)" stroke="oklch(0.85 0.20 10)" stroke-width="3"/>

    <!-- Pet silhouette in video -->
    <g transform="translate(250, 180)" opacity="0.7">
      <ellipse cx="0" cy="20" rx="60" ry="45" fill="oklch(0.40 0.08 280)"/>
      <circle cx="-35" cy="0" r="30" fill="oklch(0.40 0.08 280)"/>
      <path d="M -50 -8 L -60 -30 L -38 -12 Z" fill="oklch(0.40 0.08 280)"/>
      <path d="M -25 -12 L -15 -32 L -30 -15 Z" fill="oklch(0.40 0.08 280)"/>
    </g>

    <!-- LIVE badge -->
    <g transform="translate(25, 25)">
      <rect x="0" y="0" width="80" height="32" rx="16" fill="oklch(0.65 0.25 10)"/>
      <text x="40" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="oklch(0.95 0.02 140)" text-anchor="middle">● LIVE</text>
      <!-- Pulsing animation circle -->
      <circle cx="22" cy="16" r="6" fill="oklch(0.95 0.02 140)">
        <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Viewer count -->
    <g transform="translate(385, 25)">
      <rect x="0" y="0" width="90" height="32" rx="16" fill="oklch(0.20 0.05 275)" opacity="0.8"/>
      <text x="45" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="oklch(0.95 0.02 140)" text-anchor="middle">👁️ 1.2K</text>
    </g>

    <!-- Chat/Comments sidebar -->
    <rect x="520" y="0" width="180" height="350" rx="16" fill="oklch(0.18 0.04 275)" stroke="oklch(0.35 0.08 280)" stroke-width="2"/>

    <!-- Chat header -->
    <text x="610" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="oklch(0.85 0.08 280)" text-anchor="middle">Live Chat</text>

    <!-- Chat messages -->
    <g transform="translate(535, 60)">
      <!-- Message 1 -->
      <rect x="0" y="0" width="150" height="45" rx="8" fill="oklch(0.25 0.06 275)" opacity="0.6"/>
      <text x="10" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="oklch(0.85 0.15 140)">Sarah:</text>
      <text x="10" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="oklch(0.75 0.05 280)">So cute! 🐶❤️</text>

      <!-- Message 2 -->
      <rect x="0" y="55" width="150" height="45" rx="8" fill="oklch(0.25 0.06 275)" opacity="0.6"/>
      <text x="10" y="73" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="oklch(0.75 0.15 220)">Mike:</text>
      <text x="10" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="oklch(0.75 0.05 280)">Best stream ever!</text>

      <!-- Message 3 -->
      <rect x="0" y="110" width="150" height="45" rx="8" fill="oklch(0.25 0.06 275)" opacity="0.6"/>
      <text x="10" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="oklch(0.85 0.12 320)">Emma:</text>
      <text x="10" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="oklch(0.75 0.05 280)">What a cutie 🥰</text>
    </g>

    <!-- Progress bar showing recording -->
    <g transform="translate(15, 320)">
      <rect x="0" y="0" width="470" height="6" rx="3" fill="oklch(0.30 0.05 280)"/>
      <rect x="0" y="0" width="280" height="6" rx="3" fill="oklch(0.85 0.20 10)">
        <animate attributeName="width" values="280;470;280" dur="8s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- Coming Soon badge -->
  <g transform="translate(300, 480)">
    <rect x="0" y="0" width="200" height="60" rx="30" fill="oklch(0.85 0.20 10)" opacity="0.15"/>
    <rect x="3" y="3" width="194" height="54" rx="27" fill="none" stroke="oklch(0.85 0.20 10)" stroke-width="2" stroke-dasharray="8 4"/>
    <text x="100" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="oklch(0.85 0.20 10)" text-anchor="middle">COMING SOON</text>
  </g>

  <!-- Feature title -->
  <text x="400" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="oklch(0.75 0.08 280)" text-anchor="middle">Live Stream Your Pet's Adventures</text>

  <!-- Paw print watermark - optimized for light/dark modes -->
  <g transform="translate(730, 570)" opacity="0.6">
    <!-- Main pad with stroke for visibility -->
    <ellipse cx="0" cy="4" rx="10" ry="12" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
    <!-- Toe pads with increased spacing and strokes -->
    <ellipse cx="-11" cy="-5" rx="5" ry="7" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
    <ellipse cx="-3" cy="-8" rx="5" ry="7" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
    <ellipse cx="5" cy="-8" rx="5" ry="7" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
    <ellipse cx="13" cy="-5" rx="5" ry="7" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
  </g>
</svg>