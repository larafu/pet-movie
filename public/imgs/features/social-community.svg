<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Social Community Feature - Coming Soon -->

  <defs>
    <linearGradient id="community-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:oklch(0.30 0.12 200);stop-opacity:1" />
      <stop offset="100%" style="stop-color:oklch(0.22 0.10 210);stop-opacity:1" />
    </linearGradient>
    <radialGradient id="community-glow" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:oklch(0.70 0.18 200);stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:oklch(0.30 0.12 200);stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#community-bg)" rx="16"/>

  <!-- Glow effect -->
  <ellipse cx="400" cy="240" rx="350" ry="280" fill="url(#community-glow)"/>

  <!-- Social feed interface -->
  <g transform="translate(100, 80)">
    <!-- Main feed container -->
    <rect x="0" y="0" width="600" height="420" rx="20" fill="oklch(0.20 0.06 205)" stroke="oklch(0.70 0.18 200)" stroke-width="2"/>

    <!-- Header -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="600" height="60" rx="20 20 0 0" fill="oklch(0.25 0.08 205)"/>
      <text x="30" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="oklch(0.85 0.12 200)">🐾 Pet Movie Community</text>

      <!-- Tab indicators -->
      <g transform="translate(400, 20)">
        <rect x="0" y="0" width="80" height="28" rx="14" fill="oklch(0.70 0.18 200)" opacity="0.3"/>
        <text x="40" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="oklch(0.85 0.12 200)" text-anchor="middle">Trending</text>

        <rect x="90" y="0" width="80" height="28" rx="14" fill="oklch(0.30 0.08 205)" opacity="0.5"/>
        <text x="130" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="oklch(0.65 0.10 205)" text-anchor="middle">Following</text>
      </g>
    </g>

    <!-- Post 1 -->
    <g transform="translate(20, 80)">
      <rect x="0" y="0" width="560" height="140" rx="12" fill="oklch(0.25 0.06 205)" opacity="0.8"/>

      <!-- User avatar -->
      <circle cx="25" cy="25" r="18" fill="oklch(0.70 0.15 50)"/>
      <g transform="translate(25, 25)" opacity="0.8">
        <ellipse cx="0" cy="3" rx="8" ry="6" fill="oklch(0.30 0.08 50)"/>
        <circle cx="0" cy="-3" r="6" fill="oklch(0.30 0.08 50)"/>
        <path d="M -6 -5 L -9 -12 L -4 -7 Z" fill="oklch(0.30 0.08 50)"/>
        <path d="M 6 -5 L 9 -12 L 4 -7 Z" fill="oklch(0.30 0.08 50)"/>
      </g>

      <!-- User info -->
      <text x="55" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="oklch(0.85 0.12 200)">@sarah_golden</text>
      <text x="55" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="oklch(0.60 0.08 205)">2 hours ago</text>

      <!-- Post content -->
      <text x="25" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="oklch(0.75 0.08 205)">Just created Max's birthday movie! AI did an amazing job 🎉🐶</text>

      <!-- Video thumbnail -->
      <rect x="25" y="80" width="120" height="45" rx="6" fill="oklch(0.88 0.12 50)" opacity="0.4"/>
      <circle cx="85" cy="102" r="10" fill="oklch(0.95 0.02 140)" opacity="0.7"/>
      <path d="M 82 97 L 82 107 L 90 102 Z" fill="oklch(0.70 0.15 50)"/>

      <!-- Engagement metrics -->
      <g transform="translate(160, 102)">
        <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="oklch(0.65 0.10 205)">❤️ 234</text>
        <text x="70" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="oklch(0.65 0.10 205)">💬 45</text>
        <text x="130" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="oklch(0.65 0.10 205)">📤 89</text>
      </g>
    </g>

    <!-- Post 2 -->
    <g transform="translate(20, 240)">
      <rect x="0" y="0" width="560" height="140" rx="12" fill="oklch(0.25 0.06 205)" opacity="0.8"/>

      <!-- User avatar -->
      <circle cx="25" cy="25" r="18" fill="oklch(0.75 0.15 220)"/>
      <g transform="translate(25, 25)" opacity="0.8">
        <circle cx="0" cy="0" r="7" fill="oklch(0.30 0.08 220)"/>
        <path d="M -6 -4 L -10 -10 L -4 -6 Z" fill="oklch(0.30 0.08 220)"/>
        <path d="M 6 -4 L 10 -10 L 4 -6 Z" fill="oklch(0.30 0.08 220)"/>
      </g>

      <!-- User info -->
      <text x="55" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="oklch(0.85 0.12 200)">@mike_corgi_dad</text>
      <text x="55" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="oklch(0.60 0.08 205)">5 hours ago</text>

      <!-- Post content -->
      <text x="25" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="oklch(0.75 0.08 205)">Trending #1! My corgi's adventure movie hit 10K views! 🚀</text>

      <!-- Trending badge -->
      <rect x="25" y="80" width="90" height="28" rx="14" fill="oklch(0.85 0.20 10)" opacity="0.3"/>
      <text x="70" y="99" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="oklch(0.85 0.20 10)" text-anchor="middle">🔥 Trending</text>

      <!-- Engagement metrics -->
      <g transform="translate(25, 122)">
        <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="oklch(0.65 0.10 205)">❤️ 1.2K</text>
        <text x="80" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="oklch(0.65 0.10 205)">💬 156</text>
        <text x="160" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="oklch(0.65 0.10 205)">📤 342</text>
      </g>
    </g>
  </g>

  <!-- Community stats sidebar -->
  <g transform="translate(50, 520)">
    <rect x="0" y="0" width="700" height="60" rx="12" fill="oklch(0.25 0.08 205)" opacity="0.6"/>

    <!-- Stats -->
    <g transform="translate(80, 30)">
      <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="oklch(0.70 0.18 200)" text-anchor="middle">👥 50K+</text>
      <text x="0" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="oklch(0.55 0.08 205)" text-anchor="middle">Members</text>
    </g>

    <g transform="translate(240, 30)">
      <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="oklch(0.70 0.18 200)" text-anchor="middle">🎬 120K+</text>
      <text x="0" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="oklch(0.55 0.08 205)" text-anchor="middle">Movies Shared</text>
    </g>

    <g transform="translate(410, 30)">
      <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="oklch(0.70 0.18 200)" text-anchor="middle">💬 2M+</text>
      <text x="0" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="oklch(0.55 0.08 205)" text-anchor="middle">Comments</text>
    </g>

    <g transform="translate(560, 30)">
      <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="oklch(0.70 0.18 200)" text-anchor="middle">🌍 150+</text>
      <text x="0" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="oklch(0.55 0.08 205)" text-anchor="middle">Countries</text>
    </g>
  </g>

  <!-- Coming Soon badge -->
  <g transform="translate(300, 30)">
    <rect x="0" y="0" width="200" height="50" rx="25" fill="oklch(0.70 0.18 200)" opacity="0.2"/>
    <rect x="3" y="3" width="194" height="44" rx="22" fill="none" stroke="oklch(0.70 0.18 200)" stroke-width="2" stroke-dasharray="8 4"/>
    <text x="100" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="oklch(0.70 0.18 200)" text-anchor="middle">COMING SOON</text>
  </g>

  <!-- Paw print watermark - optimized for light/dark modes -->
  <g transform="translate(730, 570)" opacity="0.6">
    <!-- Main pad with stroke for visibility -->
    <ellipse cx="0" cy="4" rx="10" ry="12" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
    <!-- Toe pads with increased spacing and strokes -->
    <ellipse cx="-11" cy="-5" rx="5" ry="7" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
    <ellipse cx="-3" cy="-8" rx="5" ry="7" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
    <ellipse cx="5" cy="-8" rx="5" ry="7" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
    <ellipse cx="13" cy="-5" rx="5" ry="7" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
  </g>
</svg>