<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Voice Narration Feature - Coming Soon -->

  <defs>
    <linearGradient id="voice-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:oklch(0.28 0.10 330);stop-opacity:1" />
      <stop offset="100%" style="stop-color:oklch(0.20 0.08 320);stop-opacity:1" />
    </linearGradient>
    <radialGradient id="sound-wave-glow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:oklch(0.75 0.20 340);stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:oklch(0.28 0.10 330);stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#voice-bg)" rx="16"/>

  <!-- Circular glow effect -->
  <ellipse cx="400" cy="280" rx="300" ry="250" fill="url(#sound-wave-glow)"/>

  <!-- Audio interface mockup -->
  <g transform="translate(150, 120)">
    <!-- Main panel -->
    <rect x="0" y="0" width="500" height="300" rx="20" fill="oklch(0.22 0.06 325)" stroke="oklch(0.75 0.20 340)" stroke-width="2"/>

    <!-- Waveform visualization -->
    <g transform="translate(50, 80)">
      <!-- Waveform bars -->
      <rect x="0" y="60" width="8" height="40" rx="4" fill="oklch(0.65 0.18 340)" opacity="0.4"/>
      <rect x="15" y="45" width="8" height="70" rx="4" fill="oklch(0.70 0.20 340)" opacity="0.5"/>
      <rect x="30" y="30" width="8" height="100" rx="4" fill="oklch(0.75 0.22 340)" opacity="0.7"/>
      <rect x="45" y="20" width="8" height="120" rx="4" fill="oklch(0.75 0.20 340)" opacity="0.8"/>
      <rect x="60" y="35" width="8" height="90" rx="4" fill="oklch(0.80 0.22 340)"/>
      <rect x="75" y="15" width="8" height="130" rx="4" fill="oklch(0.85 0.24 340)"/>
      <rect x="90" y="25" width="8" height="110" rx="4" fill="oklch(0.80 0.22 340)"/>
      <rect x="105" y="40" width="8" height="80" rx="4" fill="oklch(0.75 0.20 340)" opacity="0.9"/>
      <rect x="120" y="50" width="8" height="60" rx="4" fill="oklch(0.70 0.18 340)" opacity="0.7"/>
      <rect x="135" y="35" width="8" height="90" rx="4" fill="oklch(0.75 0.20 340)" opacity="0.8"/>
      <rect x="150" y="25" width="8" height="110" rx="4" fill="oklch(0.80 0.22 340)"/>
      <rect x="165" y="45" width="8" height="70" rx="4" fill="oklch(0.75 0.20 340)" opacity="0.7"/>
      <rect x="180" y="55" width="8" height="50" rx="4" fill="oklch(0.70 0.18 340)" opacity="0.5"/>

      <!-- Playhead line -->
      <line x1="95" y1="0" x2="95" y2="160" stroke="oklch(0.85 0.24 340)" stroke-width="2"/>
      <circle cx="95" cy="80" r="8" fill="oklch(0.85 0.24 340)"/>
    </g>

    <!-- Voice selection dropdown -->
    <g transform="translate(270, 80)">
      <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="oklch(0.65 0.12 335)">Voice Style</text>

      <rect x="0" y="10" width="180" height="40" rx="8" fill="oklch(0.18 0.04 325)" stroke="oklch(0.65 0.18 340)" stroke-width="2"/>
      <text x="15" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="oklch(0.85 0.08 335)">🎙️ Morgan Freeman</text>

      <!-- Language selector -->
      <text x="0" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="oklch(0.65 0.12 335)">Language</text>

      <rect x="0" y="85" width="180" height="40" rx="8" fill="oklch(0.18 0.04 325)" stroke="oklch(0.65 0.18 340)" stroke-width="2"/>
      <text x="15" y="111" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="oklch(0.85 0.08 335)">🌍 English (US)</text>
    </g>

    <!-- Microphone icon (large central) -->
    <g transform="translate(100, 200)">
      <!-- Mic body -->
      <rect x="0" y="0" width="50" height="70" rx="25" fill="oklch(0.75 0.20 340)" opacity="0.3"/>
      <rect x="5" y="5" width="40" height="60" rx="20" fill="oklch(0.80 0.22 340)" opacity="0.5"/>

      <!-- Sound waves emanating -->
      <path d="M -20 30 Q -30 30 -40 25" stroke="oklch(0.75 0.20 340)" stroke-width="3" fill="none" opacity="0.4" stroke-linecap="round"/>
      <path d="M -25 35 Q -40 35 -55 30" stroke="oklch(0.75 0.20 340)" stroke-width="3" fill="none" opacity="0.3" stroke-linecap="round"/>

      <path d="M 70 30 Q 80 30 90 25" stroke="oklch(0.75 0.20 340)" stroke-width="3" fill="none" opacity="0.4" stroke-linecap="round"/>
      <path d="M 75 35 Q 90 35 105 30" stroke="oklch(0.75 0.20 340)" stroke-width="3" fill="none" opacity="0.3" stroke-linecap="round"/>

      <!-- Mic stand -->
      <rect x="20" y="70" width="10" height="20" rx="5" fill="oklch(0.70 0.18 340)" opacity="0.4"/>
      <ellipse cx="25" cy="93" rx="20" ry="6" fill="oklch(0.70 0.18 340)" opacity="0.4"/>
    </g>

    <!-- Sample narration text -->
    <g transform="translate(270, 200)">
      <rect x="0" y="0" width="180" height="85" rx="12" fill="oklch(0.18 0.04 325)" opacity="0.7"/>
      <text x="15" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-style="italic" fill="oklch(0.75 0.12 335)">"And so began the</text>
      <text x="15" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-style="italic" fill="oklch(0.75 0.12 335)">greatest adventure of</text>
      <text x="15" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-style="italic" fill="oklch(0.75 0.12 335)">Max's life..."</text>
    </g>
  </g>

  <!-- Celebrity voices preview -->
  <g transform="translate(150, 450)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="oklch(0.65 0.12 335)">Available Voice Options:</text>

    <g transform="translate(0, 15)">
      <rect x="0" y="0" width="100" height="32" rx="16" fill="oklch(0.25 0.06 325)" opacity="0.6"/>
      <text x="50" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="oklch(0.75 0.12 335)" text-anchor="middle">🎬 David</text>

      <rect x="110" y="0" width="100" height="32" rx="16" fill="oklch(0.25 0.06 325)" opacity="0.6"/>
      <text x="160" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="oklch(0.75 0.12 335)" text-anchor="middle">👑 Helen</text>

      <rect x="220" y="0" width="100" height="32" rx="16" fill="oklch(0.25 0.06 325)" opacity="0.6"/>
      <text x="270" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="oklch(0.75 0.12 335)" text-anchor="middle">🌟 Samuel</text>

      <rect x="330" y="0" width="100" height="32" rx="16" fill="oklch(0.25 0.06 325)" opacity="0.6"/>
      <text x="380" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="oklch(0.75 0.12 335)" text-anchor="middle">+50 more</text>
    </g>
  </g>

  <!-- Coming Soon badge -->
  <g transform="translate(300, 520)">
    <rect x="0" y="0" width="200" height="60" rx="30" fill="oklch(0.75 0.20 340)" opacity="0.15"/>
    <rect x="3" y="3" width="194" height="54" rx="27" fill="none" stroke="oklch(0.75 0.20 340)" stroke-width="2" stroke-dasharray="8 4"/>
    <text x="100" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="oklch(0.75 0.20 340)" text-anchor="middle">COMING SOON</text>
  </g>

  <!-- Paw print watermark - optimized for light/dark modes -->
  <g transform="translate(730, 570)" opacity="0.6">
    <!-- Main pad with stroke for visibility -->
    <ellipse cx="0" cy="4" rx="10" ry="12" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
    <!-- Toe pads with increased spacing and strokes -->
    <ellipse cx="-11" cy="-5" rx="5" ry="7" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
    <ellipse cx="-3" cy="-8" rx="5" ry="7" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
    <ellipse cx="5" cy="-8" rx="5" ry="7" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
    <ellipse cx="13" cy="-5" rx="5" ry="7" fill="oklch(0.95 0.02 140)" stroke="oklch(0.25 0.05 140)" stroke-width="1.5"/>
  </g>
</svg>